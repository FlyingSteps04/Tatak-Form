<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tatak Attendance - Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <style>
        body {
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0B1E4C;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            padding: 40px 30px;
            background: white;
            border-radius: 35px 35px 0 0;
            position: absolute;
            bottom: 0;
            box-shadow: 0 -10px 40px rgba(0,0,0,0.2);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .logo-section {
            position: absolute;
            top: -120px;
            left: 0;
            right: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: white;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .login-logo img { width: 50px; }

        .brand-name { font-size: 1.5rem; font-weight: 800; letter-spacing: 1px; }

        h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 10px; color: #0B1E4C; }
        p.subtitle { color: #64748b; margin-bottom: 30px; font-size: 0.9rem; }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group i { position: absolute; left: 15px; top: 15px; color: #94a3b8; }
        .form-control {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 1px solid #e2e8f0;
            border-radius: 15px;
            background: #f8fafc;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s;
        }
        .form-control:focus { border-color: #0B1E4C; background: white; }

        .login-btn {
            width: 100%;
            padding: 16px;
            background: #0B1E4C;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            margin-top: 10px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(11, 30, 76, 0.3);
        }
    </style>
</head>
<body>
    <div class="logo-section">
        <div class="login-logo">
            <img src="../assets/logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/50'">
        </div>
        <div class="brand-name">TATAK FORMS</div>
    </div>

    <div class="login-container">
        <h2>Welcome Back</h2>
        <p class="subtitle">Please sign in to your account</p>
        
        <form id="mobileLoginForm">
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" class="form-control" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div style="text-align: center; margin-top: 25px;">
            <a href="#" style="color: #64748b; font-size: 0.85rem; text-decoration: none;">Forgot Password?</a>
        </div>
    </div>

    <script src="../script.js"></script> <!-- Reusing existing TatakApi -->
    <script>
        document.getElementById('mobileLoginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            // Reuse existing login logic
            // ...
        });
    </script>
</body>
</html>
