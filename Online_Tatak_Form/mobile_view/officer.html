<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Officer Dashboard - Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <header class="mobile-header">
        <div class="header-left">
            <div class="header-logo">
                <img src="../assets/logo.png" alt="" style="width:100%; height:100%; object-fit:contain;">
            </div>
            <div class="header-title">OFFICER PORTAL</div>
        </div>
        <div class="header-actions">
            <button class="header-btn"><i class="fas fa-bell"></i></button>
            <button class="header-btn" id="mobileLogout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <main class="container">
        <!-- Overview Section -->
        <section id="section-overview">
            <h1 class="section-title">Hello, <span id="officer-name">Officer</span></h1>
            
            <div class="card" style="background: linear-gradient(135deg, #0B1E4C 0%, #1e3a8a 100%); color: white;">
                <div style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 5px;">ACTIVE EVENT</div>
                <h2 style="font-size: 1.3rem; margin-bottom: 15px;">IT Week Celebration</h2>
                <div style="display: flex; gap: 20px;">
                    <div>
                        <div style="font-size: 1.2rem; font-weight: 800;">452</div>
                        <div style="font-size: 0.7rem; opacity: 0.7;">Checked-in</div>
                    </div>
                    <div>
                        <div style="font-size: 1.2rem; font-weight: 800;">85%</div>
                        <div style="font-size: 0.7rem; opacity: 0.7;">Progress</div>
                    </div>
                </div>
                <div style="margin-top: 15px; height: 6px; background: rgba(255,255,255,0.1); border-radius: 10px;">
                    <div style="width: 85%; height: 100%; background: var(--mobile-accent); border-radius: 10px;"></div>
                </div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value">8</span>
                    <span class="stat-label">My Events</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value">124</span>
                    <span class="stat-label">Pending</span>
                </div>
            </div>

            <h3 style="margin-bottom: 15px;">Upcoming Tasks</h3>
            <div class="data-card">
                <div class="data-avatar" style="background: #eff6ff; color: #3b82f6;">
                    <i class="fas fa-calendar-check"></i>
                </div>
                <div class="data-info">
                    <div class="data-name">Verify Attendance</div>
                    <div class="data-meta">IT Week - Day 2</div>
                </div>
                <i class="fas fa-chevron-right" style="color: #cbd5e1;"></i>
            </div>
        </section>

        <!-- Events Section -->
        <section id="section-events" style="display: none;">
            <h1 class="section-title">Manage Events</h1>
            <div id="events-list"></div>
        </section>

        <!-- Attendance Section -->
        <section id="section-attendance" style="display: none;">
            <h1 class="section-title">Attendance Tracking</h1>
            <div id="attendance-list"></div>
        </section>

        <!-- Reports Section -->
        <section id="section-reports" style="display: none;">
            <h1 class="section-title">Reports</h1>
            <div id="reports-list"></div>
        </section>
    </main>

    <nav class="mobile-nav">
        <a href="#" class="nav-item active" data-section="overview">
            <i class="fas fa-th-large"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item" data-section="events">
            <i class="fas fa-calendar-plus"></i>
            <span>Events</span>
        </a>
        <a href="#" class="nav-item" data-section="attendance">
            <i class="fas fa-clipboard-list"></i>
            <span>Attendance</span>
        </a>
        <a href="#" class="nav-item" data-section="reports">
            <i class="fas fa-file-invoice"></i>
            <span>Reports</span>
        </a>
    </nav>

    <script src="../script.js"></script>
    <script src="js/mobile-router.js"></script>
    <script src="js/mobile-officer.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Setup navigation
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    item.classList.add('active');
                    
                    const sectionId = item.dataset.section;
                    document.querySelectorAll('main > section').forEach(s => s.style.display = 'none');
                    const targetSection = document.getElementById(`section-${sectionId}`);
                    if (targetSection) targetSection.style.display = 'block';
                });
            });

            // Initial check
            const role = localStorage.getItem('tatak_role');
            if (role !== 'Officer') window.location.href = 'index.html';
        });
    </script>
</body>
</html>
