<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Student Dashboard - Mobile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
</head>
<body>
    <header class="mobile-header">
        <div class="header-left">
            <div class="header-logo">
                <img src="../assets/logo.png" alt="" style="width:100%; height:100%; object-fit:contain;">
            </div>
            <div class="header-title">STUDENT PORTAL</div>
        </div>
        <div class="header-actions">
            <button class="header-btn"><i class="fas fa-bell"></i></button>
            <button class="header-btn" id="mobileLogout"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </header>

    <main class="container">
        <!-- Overview Section -->
        <section id="section-overview">
            <h1 class="section-title">Hello, <span id="student-name">Student</span></h1>
            
            <div class="card" style="background: var(--mobile-primary); color: white; position: relative; overflow: hidden;">
                <div style="position: relative; z-index: 2;">
                    <div style="font-size: 0.8rem; opacity: 0.8; margin-bottom: 5px;">NEXT EVENT</div>
                    <h2 id="next-event-name" style="font-size: 1.3rem; margin-bottom: 10px;">General Assembly 2026</h2>
                    <p style="font-size: 0.85rem; margin-bottom: 20px;"><i class="fas fa-map-marker-alt"></i> Main Gymnasium</p>
                    <button class="btn-primary btn-accent" style="width: auto; padding: 10px 25px; border-radius: 12px;">
                        <i class="fas fa-qrcode"></i> SCAN NOW
                    </button>
                </div>
                <!-- Decorative Circle -->
                <div style="position: absolute; right: -50px; bottom: -50px; width: 150px; height: 150px; background: rgba(255,255,255,0.1); border-radius: 50%;"></div>
            </div>

            <div class="stats-grid">
                <div class="stat-card">
                    <span class="stat-value" style="color: var(--mobile-success);">12</span>
                    <span class="stat-label">Attended</span>
                </div>
                <div class="stat-card">
                    <span class="stat-value" style="color: var(--mobile-danger);">2</span>
                    <span class="stat-label">Missed</span>
                </div>
            </div>

            <h3 style="margin-bottom: 15px;">Recent Activities</h3>
            <div id="recent-activities">
                <!-- Activities will be loaded here -->
            </div>
        </section>

        <!-- Events Section (Hidden by default) -->
        <section id="section-events" style="display: none;">
            <h1 class="section-title">Events</h1>
            <div id="events-list">
                <!-- Events will be loaded here -->
            </div>
        </section>

        <!-- History Section (Hidden by default) -->
        <section id="section-history" style="display: none;">
            <h1 class="section-title">History</h1>
            <div id="history-list">
                <!-- History items -->
            </div>
        </section>

        <!-- Reports Section (Hidden by default) -->
        <section id="section-reports" style="display: none;">
            <h1 class="section-title">Reports</h1>
            <div id="reports-list">
                <!-- Report items -->
            </div>
        </section>
    </main>

    <nav class="mobile-nav">
        <a href="#" class="nav-item active" data-section="overview">
            <i class="fas fa-home"></i>
            <span>Home</span>
        </a>
        <a href="#" class="nav-item" data-section="events">
            <i class="fas fa-calendar-alt"></i>
            <span>Events</span>
        </a>
        <a href="#" class="nav-item" data-section="history">
            <i class="fas fa-history"></i>
            <span>History</span>
        </a>
        <a href="#" class="nav-item" data-section="reports">
            <i class="fas fa-file-alt"></i>
            <span>Reports</span>
        </a>
    </nav>

    <script src="../script.js"></script>
    <script src="js/mobile-router.js"></script>
    <script src="js/mobile-student.js"></script>
    <script>
        // Specific logic for Student Dashboard
        document.addEventListener('DOMContentLoaded', () => {
            // Setup navigation
            document.querySelectorAll('.nav-item').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                    item.classList.add('active');
                    
                    const sectionId = item.dataset.section;
                    document.querySelectorAll('main > section').forEach(s => s.style.display = 'none');
                    document.getElementById(`section-${sectionId}`).style.display = 'block';
                });
            });

            // Load user data
            const role = localStorage.getItem('tatak_role');
            if (role !== 'Student') window.location.href = 'index.html';
            
            // Mock data for now
            document.getElementById('student-name').innerText = localStorage.getItem('tatak_user_name') || 'Student';
        });
    </script>
</body>
</html>
